<!DOCTYPE html>
<html lang="es">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1923;
      color: #e8e0d8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: rgba(15, 25, 35, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .header-left h1 {
      font-size: 18px;
      font-weight: 500;
      color: #f0e8e0;
      letter-spacing: 0.01em;
    }

    .header-left p {
      font-size: 11px;
      color: rgba(200,16,46,0.85);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .stats {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .stat {
      text-align: center;
    }

    .stat-n {
      font-size: 26px;
      font-weight: 500;
      line-height: 1;
      color: #f0e8e0;
    }

    .stat-n.red { color: #C8102E; }

    .stat-l {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(200,190,180,0.5);
      margin-top: 3px;
    }

    .stat-div {
      width: 1px;
      height: 32px;
      background: rgba(255,255,255,0.08);
    }

    #map-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    svg#map {
      width: 100%;
      height: 100%;
    }

    #tooltip {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      background: rgba(12, 20, 30, 0.97);
      border: 1px solid rgba(200,16,46,0.3);
      border-radius: 4px;
      padding: 12px 16px;
      width: 240px;
      z-index: 10;
    }

    .tt-country {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #C8102E;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .tt-uni {
      font-size: 13px;
      font-weight: 500;
      color: #f0e8e0;
      margin-bottom: 3px;
      line-height: 1.35;
    }

    .tt-city {
      font-size: 12px;
      color: rgba(200,190,180,0.65);
    }

    .tt-tipo {
      font-size: 11px;
      color: rgba(200,16,46,0.75);
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 28px;
      background: rgba(15, 25, 35, 0.95);
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(200,190,180,0.55);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #C8102E;
      opacity: 0.72;
      border: 1px solid rgba(255,255,255,0.4);
      flex-shrink: 0;
    }

    .hint {
      font-size: 11px;
      color: rgba(200,190,180,0.35);
      letter-spacing: 0.08em;
    }

    .source {
      font-size: 10px;
      color: rgba(200,190,180,0.2);
    }
  </style>
</head>
<body>

      {t:"Instituto",u:"UWI, Mona Campus",c:"Kingston",p:"Jamaica",la:17.997,lo:-76.746},
      {t:"Instituto",u:"Universidad Santo Tomás",c:"Santiago",p:"Chile",la:-33.443,lo:-70.852},
      {t:"Instituto",u:"PUC de Chile",c:"Santiago",p:"Chile",la:-33.440,lo:-70.638},
      {t:"Instituto",u:"Universidad de La Frontera",c:"Temuco",p:"Chile",la:-38.735,lo:-72.590},
      {t:"Instituto",u:"Universidad de Magallanes",c:"Punta Arenas",p:"Chile",la:-53.154,lo:-70.912}
    ];

    const laIds = new Set([32,28,44,52,68,76,84,152,170,188,192,212,214,218,222,308,320,328,332,340,388,484,558,591,600,604,630,740,780,858,862]);

    const wrap = document.getElementById('map-wrap');
    const svgEl = document.getElementById('map');
    const tt = document.getElementById('tooltip');

    function getSize() {
      return { w: wrap.clientWidth, h: wrap.clientHeight };
    }

    function render() {
      const { w, h } = getSize();
      const svg = d3.select('#map');
      svg.selectAll('*').remove();
      svg.attr('viewBox', `0 0 ${w} ${h}`);

      svg.append('rect').attr('width', w).attr('height', h).attr('fill', '#1a2e3e');

      const geoBox = {
        type: 'Feature',
        geometry: {
          type: 'MultiPoint',
          coordinates: [[-116,-56],[-31,30],[-116,30],[-31,-56]]
        }
      };

      const proj = d3.geoMercator().fitExtent([[20, 20], [w - 20, h - 20]], geoBox);
      const pg = d3.geoPath().projection(proj);

      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
        .then(r => r.json())
        .then(world => {
          const feats = topojson.feature(world, world.objects.countries).features;

          svg.append('g').selectAll('path').data(feats).join('path')
            .attr('d', pg)
            .attr('fill', d => laIds.has(+d.id) ? '#2a5068' : '#243830')
            .attr('stroke', 'rgba(255,255,255,0.12)')
            .attr('stroke-width', 0.5)
            .attr('stroke-linejoin', 'round');

          pts.forEach(d => {
            const pos = proj([d.lo, d.la]);
            if (!pos) return;
            const [cx, cy] = pos;

            svg.append('circle').datum(d)
              .attr('cx', cx).attr('cy', cy).attr('r', 5.5)
              .attr('fill', '#C8102E').attr('fill-opacity', 0.75)
              .attr('stroke', 'rgba(255,255,255,0.5)').attr('stroke-width', 0.8)
              .style('cursor', 'pointer')
              .on('mouseenter', function (ev, d) {
                d3.select(this).attr('fill-opacity', 1).attr('r', 7.5);
                tt.innerHTML = `
                  <div class="tt-country">${d.p}</div>
                  <div class="tt-uni">${d.u}</div>
                  <div class="tt-city">${d.c}</div>
                  <div class="tt-tipo">${d.t} Confucio</div>
                `;
                const rect = wrap.getBoundingClientRect();
                const mx = ev.clientX - rect.left;
                const my = ev.clientY - rect.top;
                const ttW = 244;
                let lx = mx + 14;
                if (lx + ttW > w - 10) lx = mx - ttW - 14;
                tt.style.left = Math.max(6, lx) + 'px';
                tt.style.top = Math.max(6, my - 50) + 'px';
                tt.style.opacity = '1';
              })
              .on('mousemove', function (ev) {
                const rect = wrap.getBoundingClientRect();
                const mx = ev.clientX - rect.left;
                const my = ev.clientY - rect.top;
                const ttW = 244;
                let lx = mx + 14;
                if (lx + ttW > w - 10) lx = mx - ttW - 14;
                tt.style.left = Math.max(6, lx) + 'px';
                tt.style.top = Math.max(6, my - 50) + 'px';
              })
              .on('mouseleave', function () {
                d3.select(this).attr('fill-opacity', 0.75).attr('r', 5.5);
                tt.style.opacity = '0';
              });
          });
        })
        .catch(() => {
          svg.append('text').attr('x', w / 2).attr('y', h / 2)
            .attr('text-anchor', 'middle').attr('fill', '#aaa').attr('font-size', 14)
            .text('No se pudo cargar el mapa. Verificá tu conexión a internet.');
        });
    }

    render();
    window.addEventListener('resize', () => { tt.style.opacity = '0'; render(); });
  </script>
</body>
</html>
